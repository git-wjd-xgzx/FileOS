+<!DOCTYPE html>
<html lang="hk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>FileOS 26</title>
    <style>
        /* ===== 全局 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: radial-gradient(ellipse at top left, #5b7a9a, #1c2e40);
            padding: 20px;
            background-attachment: fixed;
        }

        /* ===== 窗口 ===== */
        .mac-window {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-radius: 28px;
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.15) inset;
            padding: 30px 30px 28px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.3s ease;
        }

        /* ===== 标题栏 ===== */
        .window-titlebar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .traffic-lights {
            display: flex;
            gap: 8px;
            margin-right: 12px;
        }

        .light {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }
        .light-red   { background: #fe5f57; }
        .light-yellow{ background: #febc2e; }
        .light-green { background: #2bc840; }

        .window-title {
            font-size: 15px;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.55);
            letter-spacing: 0.3px;
            flex: 1;
            text-align: center;
            margin-right: 50px;
        }

        /* ===== 内容：纯文字 ===== */
        .content {
            text-align: center;
            padding: 10px 0 6px;
        }

        .main-icon {
            font-size: 64px;
            line-height: 1;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .main-title {
            font-size: 32px;
            font-weight: 700;
            color: #1c2e40;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .sub-title {
            font-size: 17px;
            color: rgba(28, 46, 64, 0.65);
            font-weight: 400;
        }

        /* ===== 底部版权（极简） ===== */
        .footer {
            margin-top: 28px;
            padding-top: 16px;
            border-top: 1px solid rgba(0, 0, 0, 0.06);
            font-size: 13px;
            color: rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        /* ===== 移动端适配 ===== */
        @media (max-width: 600px) {
            .mac-window {
                padding: 22px 18px 24px;
                border-radius: 22px;
            }
            .window-title {
                font-size: 13px;
                margin-right: 0;
            }
            .window-titlebar {
                flex-wrap: wrap;
                justify-content: center;
            }
            .traffic-lights {
                margin-right: 0;
            }
            .main-title {
                font-size: 26px;
            }
            .sub-title {
                font-size: 15px;
            }
            .main-icon {
                font-size: 52px;
            }
        }

        @media (max-width: 400px) {
            .mac-window {
                padding: 16px 14px 18px;
            }
            .main-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<div class="mac-window">

    <!-- 标题栏 -->
    <div class="window-titlebar">
        <div class="traffic-lights">
            <span class="light light-red"></span>
            <span class="light light-yellow"></span>
            <span class="light light-green"></span>
        </div>
        <div class="window-title">FileOS · 维护中</div>
    </div>

    <!-- 纯文字内容 -->
    <div class="content">
        <div class="main-icon">🛠️</div>
        <div class="main-title">系统已崩溃</div>
        <div class="sub-title">访问人数过多，html失效，正在修复，请稍等！</div>
    </div>

    <!-- 底部版权 -->
    <div class="footer">
        © 王俊迪 · 刘梓熠 · FileOS 27
        macOS Tahoe提供校验支持
        理论支持：Windows 10及以上版本 macOS Ventura及以上版本 Android™️ 12及以上版本 iOS 15及以上版本 iPadOS 16及以上版本可通过中国大陆（国内）互联网直达
        技术支持：Windows 7及以上版本  macOS high Sierra及以上版本 Android™️ 8及以上版本 iOS 12及以上版本 iPadOS 14及以上版本可尝试游戏加速器登陆
    </div>
</div>

</body>
</html>
